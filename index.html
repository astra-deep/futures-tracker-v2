<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大宗商品追踪系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1419;color:#e7e9ea;min-height:100vh;font-size:15px}
.container{max-width:1100px;margin:0 auto;padding:12px 16px}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#1a1f26;border-radius:12px;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.hdr-left h1{font-size:18px;color:#fff}
.subtitle{color:#8899a6;font-size:11px;margin-left:8px}
.hdr-right{display:flex;align-items:center;gap:8px}
.date-tag{background:#252a30;color:#8899a6;font-size:11px;padding:4px 10px;border-radius:4px}
.data-note{background:#1a2a1a;color:#34d399;font-size:11px;padding:4px 10px;border-radius:4px}

/* 滚动异动条 */
.ticker-wrap{width:100%;overflow:hidden;background:#1e242b;border-radius:8px;margin-bottom:14px;height:36px;display:flex;align-items:center}
.ticker-label{background:#6366f1;color:#fff;font-size:11px;font-weight:700;padding:0 10px;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;border-right:1px solid #2f3336}
.ticker-track{display:flex;align-items:center;gap:0;overflow:hidden;flex:1}
.ticker-item{display:flex;align-items:center;gap:6px;padding:0 16px;white-space:nowrap;font-size:12px;border-right:1px solid #2f3336;height:36px;flex-shrink:0}
.ticker-item.up{color:#ef5350}
.ticker-item.down{color:#26a69a}
.ticker-empty{color:#6b7280;font-size:12px;padding:0 16px}

/* 搜索 */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;background:#1a1f26;border:1px solid #2f3336;color:#fff;padding:11px 15px;border-radius:10px;font-size:14px}
.search-input:focus{outline:none;border-color:#6366f1}
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:#1a1f26;border:1px solid #6366f1;border-radius:10px;margin-top:4px;display:none;z-index:100;max-height:320px;overflow-y:auto}
.search-dropdown.active{display:block}
.search-item{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;cursor:pointer;border-bottom:1px solid #1e242b;text-decoration:none;color:inherit}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:#252a30}
.search-item-name{color:#fff;font-size:13px;font-weight:600}
.search-item-code{color:#8899a6;font-size:10px}
.search-item-dir{font-size:11px}
.search-empty{padding:14px;text-align:center;color:#8899a6;font-size:12px}
.search-hint{padding:9px 14px;color:#6b7280;font-size:11px;border-top:1px solid #2f3336}

/* 全球市场 */
.section-title2{font-size:11px;color:#8899a6;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px 0;display:flex;align-items:center;gap:6px}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax:110px,1fr));gap:8px;margin-bottom:14px}
.market-item{background:#1e242b;border-radius:8px;padding:10px;text-align:center;cursor:default}
.market-name{color:#8899a6;font-size:10px;margin-bottom:3px}
.market-price{color:#fff;font-size:13px;font-weight:700}
.market-chg{font-size:10px;margin-top:2px}
.up{color:#ef5350}
.down{color:#26a69a}
.neu{color:#fbbf24}
.market-up{color:#ef5350}
.market-down{color:#26a69a}
.market-neu{color:#8899a6}
.market-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.market-col{background:#1a1f26;border-radius:10px;overflow:hidden}
.market-col-hdr{padding:9px 13px;background:#1e242b;font-size:12px;font-weight:600;color:#e7e9ea;border-bottom:1px solid #2f3336}
.market-col-body{padding:10px}
.market-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1e242b;font-size:12px}
.market-row:last-child{border-bottom:none}
.market-row-name{color:#b0b8c1}
.market-row-price{color:#fff;font-weight:600}
.market-row-chg{font-size:11px;min-width:55px;text-align:right}
.market-loading{color:#6b7280;font-size:12px;text-align:center;padding:14px}
.global-tile{flex:1;min-width:120px;background:#1e242b;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
.global-tile-up{background:rgba(239,83,80,0.12)}
.global-tile-down{background:rgba(38,166,154,0.12)}
.global-tile-name{color:#8899a6;font-size:11px}
.global-tile-price{color:#fff;font-size:18px;font-weight:700}
.global-tile-chg{font-size:12px;font-weight:600}
.global-tile-up .global-tile-chg{color:#ef5350}
.global-tile-down .global-tile-chg{color:#26a69a}
.news-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.news-col{background:#1a1f26;border-radius:10px;overflow:hidden}
.news-col-hdr{padding:9px 13px;background:#1e242b;font-size:12px;font-weight:600;color:#e7e9ea;border-bottom:1px solid #2f3336;display:flex;justify-content:space-between;align-items:center}
.news-col-hdr span{font-size:11px;color:#8899a6;font-weight:400}
.news-item{padding:9px 13px;border-bottom:1px solid #1e242b}
.news-item:last-child{border-bottom:none}
.news-item-title{color:#e7e9ea;font-size:12px;line-height:1.5;margin-bottom:3px;cursor:pointer}
.news-item-title:hover{color:#6366f1}
.news-item-title .tag-hot{background:rgba(251,191,36,0.15);color:#fbbf24;font-size:10px;padding:1px 5px;border-radius:3px;margin-right:4px}
.news-item-meta{color:#6b7280;font-size:10px;display:flex;justify-content:space-between}
.news-item-meta span:first-child{color:#818cf8}
.news-more{text-align:center;padding:7px;color:#6b7280;font-size:11px;cursor:pointer}
.news-more:hover{color:#6366f1}

/* 外资研报 */

.report-modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px}
.report-modal-title{color:#fff;font-size:16px;font-weight:600;line-height:1.4;flex:1}
.report-modal-section{margin-top:14px;padding-top:14px;border-top:1px solid #2f3336}
.report-modal-section-title{color:#8899a6;font-size:11px;font-weight:600;margin-bottom:6px;text-transform:uppercase}
.report-modal-detail{color:#b0b8c1;font-size:13px;line-height:1.7}
.report-modal-key{background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:6px;padding:10px 14px;margin-top:12px}
.report-modal-key-title{color:#a5b4fc;font-size:11px;margin-bottom:4px}
.report-modal-key-text{color:#e7e9ea;font-size:13px}
.reports-section{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:14px}
.report-card{background:#1e242b;border-radius:8px;padding:11px}
.report-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.report-inst{background:#6366f1;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px}
.report-date{color:#8899a6;font-size:10px}
.report-title{color:#fff;font-size:12px;font-weight:600;margin-bottom:5px;line-height:1.4}
.report-summary{color:#b0b8c1;font-size:11px;line-height:1.6}
.report-bull{font-size:11px;font-weight:600;padding-top:5px;margin-top:5px;border-top:1px solid #2f3336}
.report-key{font-size:10px;color:#fbbf24;padding-top:4px}
.bull-bullish{color:#34d399}.bull-neutral{color:#fbbf24}.bull-bearish{color:#ef5350}

/* 板块折叠 */
.section{margin-bottom:10px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:#1a1f26;border-radius:10px;cursor:pointer;user-select:none}
.section-hdr:hover{background:#222830}
.section-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#fff}
.section-title span{font-size:15px}
.section-count{background:#252a30;color:#8899a6;font-size:10px;padding:2px 7px;border-radius:10px}
.section-arrow{color:#8899a6;font-size:11px;transition:transform 0.2s}
.section-hdr.open .section-arrow{transform:rotate(180deg)}
.section-body{display:none;padding:8px 4px;gap:8px;flex-wrap:wrap}
.section-body.open{display:flex}

/* 品种卡片 */
.var-card{background:#1a1f26;border-radius:10px;padding:12px;text-decoration:none;color:inherit;display:block;min-width:140px;flex:1;border:1px solid #2f3336;transition:all 0.2s}
.var-card:hover{transform:translateY(-2px);border-color:#6366f1}
.var-name{color:#fff;font-size:13px;font-weight:700;margin-bottom:1px}
.var-sym{color:#8899a6;font-size:10px;margin-bottom:7px}
.var-price{font-size:18px;font-weight:700;margin-bottom:1px}
.var-chg{font-size:11px;font-weight:500;margin-bottom:4px}
.var-oi{font-size:10px;color:#8899a6;margin-bottom:4px}
.var-dir{font-size:10px;padding-top:5px;border-top:1px solid #2f3336}
.focus-card{border-color:#34d399}
.warning-card{border-color:#ef5350}

.update-note{color:#6b7280;font-size:11px;text-align:center;padding:12px 0;line-height:2}

@media(max-width:600px){
  .market-section,.news-section,.note-section{grid-template-columns:1fr}
  .market-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="hdr-left"><h1>大宗商品追踪系统 <span class="subtitle">v1.5</span></h1></div>
  <div class="hdr-right"><span class="data-note">每日收盘更新</span><span class="date-tag" id="dataDate">--</span></div>
</div>

<!-- 持仓异动滚动条 -->
<div class="ticker-wrap">
  <div class="ticker-label">🚨 持仓异动</div>
  <div class="ticker-track" id="tickerTrack">
    <div class="ticker-empty">收盘后自动更新...</div>
  </div>
</div>

<!-- 搜索框 -->
<div class="search-wrap">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索品种名称或代码，如：沪铜、铜、CU、生猪、LH、棕榈油、PTA..." autocomplete="off">
  <div class="search-dropdown" id="searchDropdown"></div>
</div>

<!-- 全球市场（热力图） -->
<div class="section-title2">🌏 全球市场 <span id="globalUpdateTime" style="font-size:10px;color:#6b7280;font-weight:400;margin-left:8px"></span></div>

  </div>
  <div class="news-col">

  </div>
</div>

<!-- 外资研报摘要（折叠） -->
<div class="section-title2" id="reportsToggle" onclick="toggleReports()" style="cursor:pointer">📝 外资研报摘要 <span id="reportsCount" style="font-size:11px;color:#8899a6;font-weight:400"></span> <span id="reportsArrow" style="font-size:10px;color:#6b7280">▼</span></div>
<div class="reports-section" id="reportsContainer" style="display:none">
  <div class="market-loading">加载中...</div>
</div>

<!-- 品种板块 -->
<div class="section-title2">📦 全部追踪品种</div>
<div id="sections"></div>

<div class="update-note">

  🔍 搜索支持：中英文名称、代码（CU/P/LH/LC等）<br>
  管理页面：/admin
</div>
</div>

// ========== 渲染异动滚动条 ==========
function renderTicker() {
  const track = document.getElementById('tickerTrack');
  const alerts = Object.entries(PRICES).filter(([code, p]) => {
    return p.oi_change && Math.abs(p.oi_change) >= 10;
  }).sort((a, b) => Math.abs(b[1].oi_change) - Math.abs(a[1].oi_change));

  if (alerts.length === 0) {
    track.innerHTML = '<div class="ticker-empty">今日无显著持仓异动（±10%以上）</div>';
    return;
  }

  // 去重翻倍实现无缝滚动
  const items = [...alerts, ...alerts];
  track.innerHTML = items.map(([code, p]) => {
    const f = FRAMES[code] || {};
    const dir = p.oi_change > 0 ? 'up' : 'down';
    const arrow = p.oi_change > 0 ? '▲' : '▼';
    return `<div class="ticker-item ${dir}">
      ${f.name || code}(${code}) ${arrow}${Math.abs(p.oi_change).toFixed(1)}%
    </div>`;
  }).join('');

  // 滚动动画
  let pos = 0;
  const itemWidth = 160;
  const totalWidth = items.length * itemWidth;
  function scroll() {
    pos -= 0.5;
    if (Math.abs(pos) >= totalWidth / 2) pos = 0;
    track.style.transform = `translateX(${pos}px)`;
    requestAnimationFrame(scroll);
  }
  scroll();
}

function renderGlobal() {
  const container = document.getElementById('globalHeatmap');
  const timeEl = document.getElementById('globalUpdateTime');
  // 只显示6个核心市场
  const keyMarkets = ['SPX','NDX','DJI','HSI','NKY','VIX'];
  const items = keyMarkets.map(code => [code, GLOBAL[code] || {}]).filter(([_,d]) => d.name);
  if (items.length === 0) {
    container.innerHTML = '<div class="market-loading">暂无数据</div>';
    return;
  }
  // 显示更新时间
  if (timeEl && items[0][1].date) {
    timeEl.textContent = '更新 ' + items[0][1].date;
  }
  container.innerHTML = items.map(([code, d]) => {
    const chg = d.change || 0;
    const cls = chg > 0 ? 'global-tile-up' : chg < 0 ? 'global-tile-down' : 'global-tile';
    const arrow = chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
    const price = typeof d.price === 'number' ? (d.price > 100 ? Math.round(d.price).toLocaleString('zh-CN') : d.price.toFixed(2)) : '--';
    return `<div class="global-tile ${cls}">
      <div class="global-tile-name">${d.name || code}</div>
      <div class="global-tile-price">${price}</div>
      <div class="global-tile-chg">${arrow} ${Math.abs(chg).toFixed(2)}%</div>
    </div>`;
  }).join('');
}

// ========== 渲染品种板块 ==========
function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  CATEGORIES.forEach((cat, idx) => {
    const open = idx === 0 ? ' open' : '';
    const cards = cat.codes.map(code => {
      const f = FRAMES[code] || {};
      const p = PRICES[code] || {};
      const price = p.price;
      const change = p.change || 0;
      const chgClass = change > 0 ? 'up' : change < 0 ? 'down' : 'neu';
      const chgSign = change > 0 ? '▲' : change < 0 ? '▼' : '—';
      const dirClass = f.direction.includes('禁止') ? 'down' : f.direction.includes('聚焦') || f.direction.includes('偏多') || f.direction.includes('多头') ? 'up' : 'neu';
      let cardClass = 'var-card';
      if (f.position && f.position.includes('聚焦')) cardClass += ' focus-card';
      if (f.position && f.position.includes('禁止')) cardClass += ' warning-card';
      const displayPrice = typeof price === 'number' ? (price > 100 ? price.toLocaleString('zh-CN') : price.toFixed(2)) : '--';
      const oi = p.oi || 0;
      const oiChange = p.oi_change || 0;
      const oiArrow = oiChange > 5 ? '▲' : oiChange < -5 ? '▼' : '';
      const oiClass = oiChange > 5 ? 'up' : oiChange < -5 ? 'down' : 'neu';
      return `<a href="variety-${code.toLowerCase()}.html" class="${cardClass}">
        <div class="var-name">${f.name || code}</div>
        <div class="var-sym">${code}</div>
        <div class="var-price">${displayPrice}</div>
        <div class="var-chg ${chgClass}">${chgSign} ${Math.abs(change).toFixed(2)}%</div>
        ${oi > 0 ? `<div class="var-oi">持仓${(oi/10000).toFixed(1)}万手 <span class="${oiClass}">${oiArrow}${Math.abs(oiChange).toFixed(1)}%</span></div>` : ''}
        <div class="var-dir ${dirClass}">${f.direction || '📊 关注'}</div>
      </a>`;
    }).join('');
    container.innerHTML += `
      <div class="section">
        <div class="section-hdr${open}" onclick="toggleSection(this)">
          <div class="section-title"><span>${cat.icon}</span><span>${cat.name}</span><span class="section-count">${cat.codes.length}个</span></div>
          <span class="section-arrow">▼</span>
        </div>
        <div class="section-body${open}">${cards}</div>
      </div>`;
  });
  const cuDate = PRICES.CU ? PRICES.CU.date : '--';
  document.getElementById('dataDate').textContent = cuDate;
}

  container.innerHTML = html;

    <div class="news-item">
      <div class="news-item-title">
        ${item.hot ? '<span class="tag-hot">HOT</span>' : ''}
        ${item.title}
      </div>
      <div class="news-item-meta"><span>${item.source}</span><span>${item.time}</span></div>
    </div>
  `).join('');
}

function toggleNews() {
  const btn = document.getElementById('newsMoreBtn');
  if (!newsExpanded) {
    renderNews(allNews);
    btn.textContent = '收起 ▲';
    newsExpanded = true;
  } else {
    renderNews(allNews.slice(0, 5));
    btn.textContent = '展开更多 ▼';
    newsExpanded = false;
  }
}

// ========== 初始化 ==========
renderTicker();
renderGlobal();
renderSections();
renderReports();
loadMacroCalendar();
loadNews();
</script>
</body>
</html>
