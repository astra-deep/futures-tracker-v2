<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沪锌 (ZN) - 投资框架</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.back-bar{background:#1a1a2e;padding:12px 20px;position:sticky;top:0;z-index:100;border-bottom:1px solid #2a2a3e}
.back-bar a{display:inline-block;color:#6366f1;text-decoration:none;font-size:14px}
.back-bar a:hover{text-decoration:underline}
.content{max-width:900px;margin:0 auto;padding:20px}
.variety-header{background:#1a1a2e;border-radius:12px;padding:24px;margin-bottom:20px;border:1px solid #2a2a3e}
.variety-name{font-size:28px;font-weight:700;color:#fff;margin-bottom:4px}
.variety-code{font-size:14px;color:#6366f1;margin-bottom:12px}
.variety-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px}
.meta-item{padding:8px 16px;background:#0a0a0f;border-radius:8px}
.meta-label{font-size:11px;color:#888;margin-bottom:2px}
.meta-value{font-size:15px;font-weight:600;color:#fff}
.price-section{background:#1a1a2e;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #2a2a3e}
.section-title{font-size:12px;color:#888;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.price-item{padding:10px;background:#0a0a0f;border-radius:8px;text-align:center}
.price-label{font-size:11px;color:#888;margin-bottom:4px}
.price-value{font-size:18px;font-weight:700}
.up{color:#ef4444}
.down{color:#22c55e}
.neutral{color:#888}
.levels-section{background:#1a1a2e;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #2a2a3e}
.levels-grid{display:flex;flex-direction:column;gap:8px}
.level-item{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-radius:8px}
.level-long{background:rgba(34,197,94,0.1);border-left:3px solid #22c55e}
.level-short{background:rgba(239,68,68,0.1);border-left:3px solid #ef4444}
.level-neutral{background:rgba(99,102,241,0.1);border-left:3px solid #6366f1}
.level-price{font-size:15px;font-weight:600;color:#fff}
.level-label{font-size:13px;color:#aaa}
.footer{padding:20px;text-align:center;color:#444;font-size:12px}
</style>
</head>
<body>
<div class="back-bar"><a href="index.html">← 返回大宗商品追踪</a></div>
<div class="content">
  <div class="variety-header">
    <div class="variety-name">沪锌</div>
    <div class="variety-code">ZN | 有色金属 | 更新时间: 20260424</div>
    <div class="variety-meta">
      <div class="meta-item"><div class="meta-label">交易单位</div><div class="meta-value">元/吨</div></div>
      <div class="meta-item"><div class="meta-label">关注方向</div><div class="meta-value">📊 关注</div></div>
    </div>
  </div>
  <div class="price-section">
    <div class="section-title">价格数据</div>
    <div class="price-grid">
      <div class="price-item"><div class="price-label">当前价格</div><div class="price-value down">24225.00</div></div>
      <div class="price-item"><div class="price-label">涨跌幅</div><div class="price-value down">-0.33%</div></div>
      <div class="price-item"><div class="price-label">持仓量</div><div class="price-value neutral">10.4万手</div></div>
      <div class="price-item"><div class="price-label">持仓变化</div><div class="price-value up">+0.0万手</div></div>
    </div>
  </div>
  <div class="levels-section">
    <div class="section-title">投资框架 - 关键价位</div>
    <div class="levels-grid">
      <div class="level-item level-long">
        <span class="level-price">18000-20000</span>
        <span class="level-label">偏低估</span>
      </div>
      <div class="level-item level-neutral">
        <span class="level-price">20000-22000</span>
        <span class="level-label">中性偏低</span>
      </div>
      <div class="level-item level-neutral">
        <span class="level-price">22000-24500</span>
        <span class="level-label">中性偏高</span>
      </div>
      <div class="level-item level-short">
        <span class="level-price">24500+</span>
        <span class="level-label">偏高估</span>
      </div>
    </div>
  </div>
</div>
<div class="footer">大宗商品追踪系统 | 数据仅供参考，不构成投资建议</div>
</body>
</html>
