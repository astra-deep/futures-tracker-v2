<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苯乙烯 (EB) - 大宗商品追踪</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1419;color:#e7e9ea;min-height:100vh;font-size:15px}
.container{max-width:1100px;margin:0 auto;padding:12px 16px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:#6366f1;text-decoration:none;font-size:13px;margin-bottom:16px}
.back-link:hover{text-decoration:underline}
.hero{background:#1a1f26;border-radius:12px;padding:24px;margin-bottom:16px}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.hero-name{font-size:22px;font-weight:700;color:#fff}
.hero-sym{color:#8899a6;font-size:13px;margin-top:4px}
.hero-contract{color:#a5b4fc;font-size:12px;margin-top:4px;background:#1e242b;padding:4px 8px;border-radius:4px;display:inline-block}
.hero-data{text-align:right}
.hero-price{font-size:32px;font-weight:700;color:#fff}
.hero-chg{font-size:16px;margin-top:4px}
.hero-chg.up{color:#ef5350}.hero-chg.down{color:#26a69a}.hero-chg.neu{color:#8899a6}
.hero-date{color:#6b7280;font-size:11px;margin-top:4px}
.hero-oi{font-size:12px;color:#8899a6;margin-top:8px}
.hero-oi strong{color:#fff}
.oi-change{font-size:11px;font-weight:600;margin-left:8px}
.up{color:#ef5350}.down{color:#26a69a}.neu{color:#fbbf24}
.dir-badge{display:inline-block;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;margin:8px 0}
.dir-up{background:rgba(239,83,80,0.15);color:#ef5350}
.dir-down{background:rgba(38,166,154,0.15);color:#26a69a}
.dir-neutral{background:rgba(99,102,241,0.15);color:#a5b4fc}
.pcr-section{background:#1a1f26;border-radius:10px;overflow:hidden;margin-bottom:16px}
.pcr-hdr{background:#1e242b;padding:10px 14px;font-size:12px;font-weight:600;border-bottom:1px solid #2f3336;display:flex;justify-content:space-between}
.pcr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.pcr-item{padding:12px 14px;border-right:1px solid #2f3336;text-align:center}
.pcr-item:last-child{border-right:none}
.pcr-label{font-size:11px;color:#8899a6;margin-bottom:4px}
.pcr-value{font-size:16px;font-weight:700;color:#fff}
.pcr-date{padding:6px 14px;font-size:11px;color:#6b7280;border-top:1px solid #2f3336}
.tier{background:#1a1f26;border-radius:10px;padding:18px;margin-bottom:12px}
.tier-title{color:#8899a6;font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:10px}
.tier-content{color:#e7e9ea;font-size:13px;line-height:1.7}
.tier-content strong{color:#fff}
.signal-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.signal-card{background:#1a1f26;border-radius:10px;padding:16px}
.signal-title{font-size:11px;color:#8899a6;font-weight:600;text-transform:uppercase;margin-bottom:8px}
.signal-text{font-size:13px;color:#e7e9ea;line-height:1.5}
.signal-long{color:#34d399}.signal-short{color:#ef5350}.signal-reversal{color:#f59e0b}
.back-btn{display:block;width:100%;text-align:center;background:#1e242b;color:#8899a6;border:none;border-radius:8px;padding:12px;cursor:pointer;font-size:13px;margin-top:20px;text-decoration:none}
@media(max-width:600px){.hero-top{flex-direction:column}.hero-data{text-align:left}.signal-section{grid-template-columns:1fr}}
</style>
</head>
<body>

</html>
